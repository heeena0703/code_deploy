<!DOCTYPE html>
<html>
<head>
<title>User Data</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
width:350px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.data{
margin:10px 0;
padding:8px;
border-bottom:1px solid #ddd;
}

label{
font-weight:bold;
color:#333;
}

span{
float:right;
color:#555;
}

button{
margin-top:20px;
width:100%;
padding:10px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>User Information</h2>

<div class="data">
<label>Full Name:</label>
<span id="name"></span>
</div>

<div class="data">
<label>Age:</label>
<span id="age"></span>
</div>

<div class="data">
<label>Phone:</label>
<span id="phone"></span>
</div>

<div class="data">
<label>Email:</label>
<span id="email"></span>
</div>

<div class="data">
<label>Address:</label>
<span id="address"></span>
</div>

<div class="data">
<label>Pincode:</label>
<span id="pincode"></span>
</div>

<!-- Logout Button -->
<button onclick="logout()">Logout</button>

</div>

<script>

let user = JSON.parse(localStorage.getItem("userData"));
console.log(user);
console.log(localStorage.getItem("userData"))
if(user){
document.getElementById("name").innerText = user.name;
document.getElementById("age").innerText = user.age;
document.getElementById("phone").innerText = user.phone;
document.getElementById("email").innerText = user.email;
document.getElementById("address").innerText = user.address;
document.getElementById("pincode").innerText = user.pincode;
}

function logout(){

localStorage.removeItem("user");  // remove stored user

alert("Logged out successfully");

window.location.href = "Login.html"; // go back to login page

}

</script>

</body>
</html>
